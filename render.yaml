databases:
  - name: brillante-db
    plan: free
    databaseName: brillante
    user: brillante

services:
  # API Backend
  - type: web
    name: turquesa-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brillante-db
          property: connectionString
      - key: PORT
        value: 4000

  # Frontend (static sites are free by default)
  - type: web
    name: turquesa-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://turquesa-api.onrender.com/api
