databases:
  - name: brillante-db
    plan: free
    databaseName: brillante
    user: brillante

services:
  # API Backend
  - type: web
    name: turquesa-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brillante-db
          property: connectionString
      - key: PORT
        value: 4000

  # Frontend
  - type: web
    name: turquesa-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://turquesa-api.onrender.com/api/*
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
